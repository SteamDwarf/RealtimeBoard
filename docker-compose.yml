version: "3.8"

services:
  # База данных PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: realtime_board_db
    environment:
      POSTGRES_USER: postgresql
      POSTGRES_PASSWORD: postgresql
      POSTGRES_DB: realtime_board
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # In-memory хранилище Redis для real-time данных
  redis:
    image: redis:7-alpine
    container_name: realtime_board_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
